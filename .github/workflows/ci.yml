name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # The toolchain (incl. rustfmt + clippy) is pinned in rust-toolchain.toml,
      # so fmt/clippy are deterministic across machines.
      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      # z3 lets the Tier-2 SMT verification tests actually run (they skip
      # gracefully when absent).
      - name: Install z3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y z3
      - name: Install z3 (macOS)
        if: runner.os == 'macOS'
        run: brew install z3

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
