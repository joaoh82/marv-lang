name: Release

# Tag-driven releases: push a semver tag (e.g. v0.1.0) to build the `marv` and
# `marv-mcp` binaries for macOS + Linux and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the release (with auto-generated notes) exactly once, before any
  # build job touches it. Running `generate_release_notes` inside the build
  # matrix appended one copy of the notes per matrix job (MARV-2).
  release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: build ${{ matrix.target }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          # Cross-compile the Intel macOS binary on the Apple-Silicon runner.
          # The dedicated Intel `macos-13` runners are scarce and queue
          # indefinitely; an arm64 macOS runner cross-builds x86_64 just fine
          # (`rustup target add` + `--target` below).
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Rust toolchain + target
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p marv-cli -p marv-mcp

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist="marv-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/marv" "$dist/"
          cp "target/${{ matrix.target }}/release/marv-mcp" "$dist/"
          cp -R std "$dist/std"
          cp -R docs "$dist/docs"
          cp -R spec "$dist/spec"
          cp -R examples "$dist/examples"
          cp README.md LICENSE-MIT LICENSE-APACHE AGENTS.md "$dist/"
          tar czf "${dist}.tar.gz" "$dist"
          shasum -a 256 "${dist}.tar.gz" > "${dist}.tar.gz.sha256"

      # Upload assets only — no release-info keys, so the body created by the
      # `release` job is left untouched (the action retains existing release
      # info when keys like `body`/`generate_release_notes` are unset).
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            marv-*.tar.gz
            marv-*.tar.gz.sha256
